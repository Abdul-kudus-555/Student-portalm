<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AcadPortal — Student Information System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/sidebar.css" />
  <link rel="stylesheet" href="css/topbar.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

  <!-- Mobile overlay -->
  <div class="overlay" id="overlay"></div>

  <div class="app">

    <!-- ── Sidebar ── -->
    <aside class="sidebar" id="sidebar">
      <div class="sb-brand">
        <div class="sb-brand-name">AcadPortal</div>
        <div class="sb-brand-sub">Student Information System</div>
      </div>

      <div class="sb-profile">
        <div class="avatar sage">KA</div>
        <div>
          <div class="sb-profile-name">Kofi Asante</div>
          <div class="sb-profile-sub">CS · Level 300 · ID: 20210432</div>
        </div>
      </div>

      <nav class="sb-nav">
        <div class="nav-group-label">Main</div>
        <a class="nav-link active" data-page="dashboard">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.9"/>
            <rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.5"/>
            <rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.5"/>
            <rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.5"/>
          </svg>
          Dashboard
        </a>
        <a class="nav-link" data-page="courses">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 3h12M2 8h8M2 13h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Courses
        </a>
        <a class="nav-link" data-page="results">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M5 8h6M5 11h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          Results
        </a>
        <a class="nav-link" data-page="schedule">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="3" width="12" height="11" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M5 3V2M11 3V2M2 7h12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          Schedule
        </a>
        <a class="nav-link" data-page="fees">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="4" width="14" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M1 7h14" stroke="currentColor" stroke-width="1.3"/>
            <path d="M4 10.5h2M10 10.5h2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          Fees &amp; Payments
        </a>

        <div class="nav-group-label" style="margin-top: 8px;">Account</div>
        <a class="nav-link" data-page="profile">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/>
            <path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          My Profile
        </a>
      </nav>

      <div class="sb-footer">
        <span>2025/2026 Sem. 2</span>
        <button class="logout-btn" id="logoutBtn">Sign out</button>
      </div>
    </aside>

    <!-- ── Main ── -->
    <div class="main">

      <!-- Topbar -->
      <div class="topbar">
        <div class="topbar-left">
          <button class="hamburger" id="hamburger" aria-label="Toggle menu">
            <span></span><span></span><span></span>
          </button>
          <div class="page-title" id="pageTitle">Dashboard</div>
        </div>
        <div class="topbar-right">
          <span class="semester-tag">Semester 2 — Active</span>
          <div class="icon-btn" id="notifBtn" title="Notifications">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 1.5A4.5 4.5 0 0112.5 6c0 2 .5 3 1 3.5H2.5c.5-.5 1-1.5 1-3.5A4.5 4.5 0 018 1.5z" stroke="currentColor" stroke-width="1.4"/>
              <path d="M6.5 13a1.5 1.5 0 003 0" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            <div class="badge-dot" id="notifDot"></div>
          </div>
          <div class="avatar sage sm" id="profileAvatarBtn">KA</div>
        </div>
      </div>

      <!-- Page Content -->
      <div class="content" id="content">
        <!-- Pages are injected here by JS -->
      </div>

    </div>
  </div>

  <!-- Notification Dropdown -->
  <div class="notif-dropdown" id="notifDropdown">
    <div class="notif-header">
      <span>Notifications</span>
      <button class="notif-clear" id="clearNotif">Mark all read</button>
    </div>
    <div class="notif-list" id="notifList"></div>
  </div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/router.js"></script>
  <script src="js/components.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/courses.js"></script>
  <script src="js/pages/results.js"></script>
  <script src="js/pages/schedule.js"></script>
  <script src="js/pages/fees.js"></script>
  <script src="js/pages/profile.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
